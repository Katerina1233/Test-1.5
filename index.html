<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Service center</title>
  </head>
  <body>
    <div class="brand">
      <div class="brand-title">
        <h2 class="brand-title__text">Ремонт техники различных брендов</h2>
      </div>
          
      <div class="swiper">
        <!-- Additional required wrapper -->
        <div class="swiper-wrapper">
          <!-- Slides -->
          <div class="swiper-slide">
            <div class="card">
              <span class="img-card--lenovo"></span>
              <button class="button-next" type="button"></button>
            </div>
          </div>
          <div class="swiper-slide">
            <div class="card">
              <span class="img-card--samsung"></span>
              <button class="button-next" type="button"></button>
            </div>
          </div>
          <div class="swiper-slide">
            <div class="card">
              <span class="img-card--apple"></span>
              <button class="button-next" type="button"></button>
            </div>
          </div>
          <div class="swiper-slide">
            <div class="card">
              <span class="img-card--vievSonic"></span>
              <button class="button-next" type="button"></button>
            </div>
          </div>
          <div class="swiper-slide">
            <div class="card">
              <span class="img-card--bosch"></span>
              <button class="button-next" type="button"></button>
            </div>
          </div>
          <div class="swiper-slide">
            <div class="card">
              <span class="img-card--hp"></span>
              <button class="button-next" type="button"></button>
            </div>
          </div>
          <div class="swiper-slide">
            <div class="card">
              <span class="img-card--acer"></span>
              <button class="button-next" type="button"></button>
            </div>
          </div>
          <div class="swiper-slide">
            <div class="card">
              <span class="img-card--sony"></span>
              <button class="button-next" type="button"></button>
            </div>
          </div>
        </div>
        <div class="swiper-buttons">
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
      </div>
      <div class="swiper-pagination"></div>
      <div class="brand-repair">
        <div class="card">
          <span class="img-card--lenovo"></span>
          <button class="button-next" type="button"></button>
        </div>
        <div class="card">
          <span class="img-card--samsung"></span>
          <button class="button-next" type="button"></button>
        </div>
        <div class="card">
          <span class="img-card--apple"></span>
          <button class="button-next" type="button"></button>
        </div>
        <div class="card">
          <span class="img-card--vievSonic"></span>
          <button class="button-next" type="button"></button>
        </div>
        <div class="card">
          <span class="img-card--bosch"></span>
          <button class="button-next" type="button"></button>
        </div>
        <div class="card">
          <span class="img-card--hp"></span>
          <button class="button-next" type="button"></button>
        </div>
        <div class="card">
          <span class="img-card--acer"></span>
          <button class="button-next" type="button"></button>
        </div>
        <div class="card">
          <span class="img-card--sony"></span>
          <button class="button-next" type="button"></button>
        </div>
        <div class="hidden-card">
          <span class="img-card--lenovo"></span>
          <button class="button-next" type="button"></button>
        </div>
        <div class="hidden-card">
          <span class="img-card--samsung"></span>
          <button class="button-next" type="button"></button>
        </div>
        <div class="hidden-card">
          <span class="img-card--apple"></span>
          <button class="button-next" type="button"></button>
        </div>
      </div>
      <button class="brand__show-hide" type="button">Показать все</button>
    </div>
  </div>
  </main>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
